<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Jayden And Nevs Stats</h1>
    <p class="subtitle">July 18, 2025 → July 18, 2026</p>

    <div class="cards">

        <!-- TIME TOGETHER -->
        <div class="card">
            <h2>Time Together ❤️</h2>

            <div class="time">
                <p>Years <span id="tYears"></span></p>
                <p>Months <span id="tMonths"></span></p>
                <p>Weeks <span id="tWeeks"></span></p>
                <p>Days <span id="tDays"></span></p>
                <p>Hours <span id="tHours"></span></p>
            </div>

            <div class="summary" id="tSummary">
                💕 0 months, 0 days together
            </div>
        </div>

        <!-- COUNTDOWN -->
        <div class="card">
            <h2>Countdown ⏳</h2>

            <div class="time">
                <p>Years <span id="cYears"></span></p>
                <p>Months <span id="cMonths"></span></p>
                <p>Weeks <span id="cWeeks"></span></p>
                <p>Days <span id="cDays"></span></p>
                <p>Hours <span id="cHours"></span></p>
                <p>Seconds <span id="cSeconds"></span></p>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
